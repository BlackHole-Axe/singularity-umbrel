version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: singularity-pool_pool_1
      APP_PORT: 3337
      # Dashboard, read-only APIs and the widget endpoint are reachable without
      # Umbrel auth; everything else stays behind Umbrel auth.
      PROXY_AUTH_WHITELIST: "/api/state,/events,/api/logs,/api/diag,/widget-api/*"

  pool:
    # The pre-start hook builds this image on-device from the bundled pool/ source,
    # so install works without publishing to a registry. compose finds it ready.
    build:
      context: ${APP_DATA_DIR}/pool
      dockerfile: Dockerfile
    image: ghcr.io/blackhole-axe/singularity-pool:latest
    pull_policy: build
    container_name: singularity-pool_pool_1
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - "2038:2038" # Stratum — point your ASIC miners here
    volumes:
      - "${APP_DATA_DIR}/data:/data"
    environment:
      # --- Bitcoin node: injected automatically by Umbrel (dependencies: [bitcoin]) ---
      RPC_URL: http://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_RPC_PORT}/
      RPC_USER: ${APP_BITCOIN_RPC_USER}
      RPC_PASS: ${APP_BITCOIN_RPC_PASS}
      # Umbrel reports the correct hashblock port (28334) — no manual ZMQ setup needed.
      ZMQ_BLOCKS: tcp://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
      BITCOIN_NETWORK: mainnet

      # --- Payout FALLBACK ---
      # Only used for miners that connect WITHOUT a Bitcoin address as their username.
      # >>> CHANGE THIS to YOUR OWN Bitcoin address. <<<
      PAYOUT_ADDRESS: "bc1q6278q0a0ttmhjc0jhhaut6ekk2waf045yhql3s"
      # Coinbase tag written into every block this pool finds. Shows in the block's
      # coinbase details on mempool.space / explorers as "SINGULARITY on Umbrel".
      # Register the name officially via a PR to github.com/mempool/mining-pools
      # (see mempool-pool-entry.json) so explorers label the block "SINGULARITY".
      COINBASE_TAG: "SINGULARITY on Umbrel"

      # --- Ports / binds ---
      STRATUM_PORT: "2038"
      STRATUM_BIND: "0.0.0.0"
      DASHBOARD_PORT: "3337"
      DASHBOARD_BIND: "0.0.0.0"

      # --- Mining behaviour (sane defaults for ASIC fleets) ---
      START_DIFFICULTY: "1024"
      MIN_DIFFICULTY: "1024"
      MAX_DIFFICULTY: "0"
      TARGET_SHARE_SECS: "8"
      RETARGET_SECS: "30"
      VERSION_MASK: "1fffe000"
      TEMPLATE_REFRESH_MS: "30000"
      POLL_FALLBACK_MS: "250"
      INSTANT_EMPTY_JOB: "true"
      STALE_GRACE_MS: "3000"
      WORKER_IDLE_SECS: "300"
      DATA_DIR: "/data"
      NODE_ENV: "production"
